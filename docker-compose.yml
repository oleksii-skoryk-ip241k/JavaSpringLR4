version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mysql_db_lr4
    environment:
      MYSQL_DATABASE: javaSpringLR
      MYSQL_USER: admin
      MYSQL_PASSWORD: 12345678
      MYSQL_ROOT_PASSWORD: 12345678
    ports:
      - "3307:3306"

  app:
    image: openjdk:11-jre-slim
    container_name: dropwizard_app
    volumes:
      - ./target/JavaSpringLR4-1.0.0-SNAPSHOT.jar:/app/app.jar
      - ./config.yml:/app/config.yml
    command: java -jar /app/app.jar server /app/config.yml
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - db
